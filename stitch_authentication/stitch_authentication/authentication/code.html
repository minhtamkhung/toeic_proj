<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TOEIC Sanctuary | Join the Fluid Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#d8e2ff",
                        "inverse-surface": "#2e3132",
                        "secondary": "#495e8a",
                        "on-background": "#191c1d",
                        "surface-tint": "#005ac2",
                        "surface": "#f8f9fa",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-container": "#b75b00",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-primary-fixed": "#001a42",
                        "on-tertiary": "#ffffff",
                        "background": "#f8f9fa",
                        "on-surface-variant": "#424754",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-container": "#b6ccff",
                        "tertiary-fixed": "#ffdcc6",
                        "tertiary-fixed-dim": "#ffb786",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary": "#924700",
                        "primary": "#0058be",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#d8e2ff",
                        "secondary-fixed-dim": "#b1c6f9",
                        "outline-variant": "#c2c6d6",
                        "surface-container": "#edeeef",
                        "primary-container": "#2170e4",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001a42",
                        "on-secondary-fixed-variant": "#304671",
                        "on-secondary-container": "#405682",
                        "outline": "#727785",
                        "inverse-primary": "#adc6ff",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed-variant": "#004395",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary-fixed": "#311400"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pattern {
            background-color: #f8f9fa;
            background-image: radial-gradient(#d8e2ff 0.8px, transparent 0.8px), radial-gradient(#d8e2ff 0.8px, #f8f9fa 0.8px);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="bg-pattern font-body text-on-surface min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-lg">
<!-- Brand Header: Slightly Playful Anchor -->
<div class="text-center mb-10 flex flex-col items-center">
<div class="w-20 h-20 bg-gradient-to-br from-primary to-primary-container rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center mb-6 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
<span class="material-symbols-outlined text-white text-5xl" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">TOEIC Sanctuary</h1>
<p class="text-on-surface-variant font-medium">Your editorial path to English mastery.</p>
</div>
<!-- Auth Card -->
<div class="glass-effect rounded-xl shadow-2xl shadow-surface-tint/5 p-8 md:p-12 relative overflow-hidden">
<!-- Asymmetric Accent -->
<div class="absolute -top-12 -right-12 w-24 h-24 bg-tertiary-fixed rounded-full opacity-30"></div>
<!-- Toggle Section -->
<div class="flex items-center justify-center mb-10 p-1 bg-surface-container-low rounded-full w-fit mx-auto">
<button class="px-8 py-2.5 rounded-full text-sm font-semibold transition-all duration-300 bg-primary text-on-primary shadow-lg shadow-primary/20">Login</button>
<button class="px-8 py-2.5 rounded-full text-sm font-semibold text-on-surface-variant hover:text-primary transition-all duration-300">Register</button>
</div>
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold font-label text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/15 rounded-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline-variant" id="username" placeholder="TheFluidScholar" type="text"/>
</div>
</div>
<!-- Email Field with Error State -->
<div class="space-y-2">
<label class="block text-sm font-semibold font-label text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-error" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border-2 border-error-container rounded-md focus:ring-2 focus:ring-error focus:border-transparent outline-none transition-all" id="email" type="email" value="alex@example"/>
</div>
<div class="flex items-center gap-1.5 ml-1 text-error text-xs font-semibold">
<span class="material-symbols-outlined text-sm" data-icon="error">error</span>
                        Email is invalid
                    </div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold font-label text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-lowest border border-outline-variant/15 rounded-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-md shadow-xl shadow-primary/30 hover:shadow-primary/40 transition-all duration-300 transform active:scale-[0.98] mt-4" type="submit">
                    Continue Journey
                </button>
<!-- Social Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest">Or social link</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Secondary Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high rounded-md hover:bg-surface-variant transition-colors group" type="button">
<img alt="Google" class="w-4 h-4 grayscale group-hover:grayscale-0 transition-all" data-alt="Google colorful brand favicon logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxsY_h1IrqLxl27AIcWxhtag-hJJQIrUpRbgQfSfvvOwdc6dYHIdfT3HFBLZTGjHbLa7eoxyu9qn92j25apVOUMK73-Xb53G_1REbTY4vgj0SgJBcEW51Oi5mNebKtzGWe6fe5F6SIZweOfUTTJYJ86nf3Crufac2qKayNdMO-6s6dYuaabnUzVU2EfDhvhKU_gbhi7ce-jFFXu9dPX25xKQi0MiBMHF3bhELRCsRF754deNBgzv-S48UF-uAGtj5k-l_VZlhdyBQ"/>
<span class="text-sm font-bold text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high rounded-md hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="apple">ios</span>
<span class="text-sm font-bold text-on-surface-variant">Apple ID</span>
</button>
</div>
</form>
</div>
<!-- Footer Meta -->
<p class="text-center mt-8 text-on-surface-variant text-xs font-medium px-4 leading-relaxed">
            By continuing, you agree to our <a class="text-primary font-bold underline decoration-primary/30" href="#">Terms of Sanctuary</a> and 
            <a class="text-primary font-bold underline decoration-primary/30" href="#">Privacy Manifesto</a>.
        </p>
</div>
</body></html>
