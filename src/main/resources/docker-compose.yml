# =============================================================
# docker-compose.yml — chạy PostgreSQL + Redis local
# Dùng lệnh: docker compose up -d
# =============================================================

services:

  postgres:
    image: postgres:15-alpine
    container_name: toeic_postgres
    environment:
      POSTGRES_DB: toeic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: toeic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: